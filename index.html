<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista della Spesa</title>
  <style>
    :root {
      --bg: #0f0f11;
      --surface: #18181c;
      --surface-raised: #1e1e24;
      --border: rgba(255,255,255,0.07);
      --border-focus: rgba(255,255,255,0.18);
      --text: #f0eee8;
      --muted: rgba(240,238,232,0.5);
      --faint: rgba(240,238,232,0.28);

      --ila:    #f4a4c0;
      --andre:  #89c4f4;
      --matte:  #a8e6a3;
      --nick:   #f4d08a;

      --ila-bg:   rgba(244,164,192,0.1);
      --andre-bg: rgba(137,196,244,0.1);
      --matte-bg: rgba(168,230,163,0.1);
      --nick-bg:  rgba(244,208,138,0.1);

      --radius: 18px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Helvetica Neue", "Segoe UI", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background:
        radial-gradient(ellipse at 20% 0%,   rgba(137,196,244,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%,  rgba(244,164,192,0.05) 0%, transparent 50%),
        var(--bg);
    }

    /* ── LAYOUT ─────────────────────────────────────── */
    .app {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ── HEADER ─────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .header-left h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .header-left .subtitle {
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 3px;
    }

    .item-count {
      color: var(--muted);
      font-size: 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 999px;
    }

    /* ── USER SELECTOR ──────────────────────────────── */
    .user-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .user-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px 8px 10px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 200ms ease;
      font-family: inherit;
    }

    .user-chip:hover { border-color: var(--border-focus); color: var(--text); }

    .user-chip[data-user="ila"].active   { border-color: var(--ila);   background: var(--ila-bg);   color: var(--ila); }
    .user-chip[data-user="andre"].active { border-color: var(--andre); background: var(--andre-bg); color: var(--andre); }
    .user-chip[data-user="matte"].active { border-color: var(--matte); background: var(--matte-bg); color: var(--matte); }
    .user-chip[data-user="nick"].active  { border-color: var(--nick);  background: var(--nick-bg);  color: var(--nick); }

    .avatar {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      flex: none;
    }

    .avatar[data-user="ila"]   { background: var(--ila);   color: #1a0a10; }
    .avatar[data-user="andre"] { background: var(--andre); color: #051524; }
    .avatar[data-user="matte"] { background: var(--matte); color: #051a04; }
    .avatar[data-user="nick"]  { background: var(--nick);  color: #1a1204; }

    /* ── ADD FORM ───────────────────────────────────── */
    .add-form {
      display: flex; gap: 10px;
      margin-bottom: 32px;
    }

    .add-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 200ms;
      font-family: inherit;
    }

    .add-input::placeholder { color: var(--faint); }
    .add-input:focus { border-color: var(--border-focus); }

    .add-btn {
      width: 48px; height: 48px;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--text);
      color: var(--bg);
      font-size: 1.5rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex: none;
      transition: opacity 200ms, transform 120ms;
    }

    .add-btn:hover  { opacity: 0.88; }
    .add-btn:active { transform: scale(0.94); }
    .add-btn:disabled { opacity: 0.28; cursor: not-allowed; }

    /* ── SECTION LABEL ──────────────────────────────── */
    .section-label {
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 12px;
    }

    /* ── LIST ───────────────────────────────────────── */
    #item-list {
      display: grid;
      gap: 8px;
      list-style: none;
    }

    .item-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 200ms, opacity 220ms;
      animation: slide-in 220ms ease;
    }

    .item-card:hover { border-color: var(--border-focus); }
    .item-card.checked { opacity: 0.38; }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .check-btn {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 1.5px solid var(--border-focus);
      background: transparent;
      cursor: pointer;
      flex: none;
      display: flex; align-items: center; justify-content: center;
      transition: all 180ms;
      color: transparent;
      font-size: 0.72rem;
      font-family: inherit;
    }

    .item-card.checked .check-btn {
      background: rgba(255,255,255,0.18);
      border-color: transparent;
      color: var(--text);
    }

    .item-text {
      flex: 1;
      font-size: 0.97rem;
      line-height: 1.3;
      min-width: 0;
      word-break: break-word;
    }

    .item-card.checked .item-text { text-decoration: line-through; }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      flex: none;
    }

    .item-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      flex: none;
    }

    .item-avatar[data-user="ila"]   { background: var(--ila-bg);   color: var(--ila);   border: 1px solid var(--ila); }
    .item-avatar[data-user="andre"] { background: var(--andre-bg); color: var(--andre); border: 1px solid var(--andre); }
    .item-avatar[data-user="matte"] { background: var(--matte-bg); color: var(--matte); border: 1px solid var(--matte); }
    .item-avatar[data-user="nick"]  { background: var(--nick-bg);  color: var(--nick);  border: 1px solid var(--nick); }

    .item-name-tag {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .delete-btn {
      width: 28px; height: 28px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--faint);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      transition: background 160ms, color 160ms;
      flex: none;
      font-family: inherit;
    }

    .delete-btn:hover { background: rgba(255,80,80,0.12); color: rgba(255,120,120,0.9); }

    /* ── EMPTY STATE ────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 52px 0;
      color: var(--faint);
    }

    .empty-state .icon { font-size: 2.4rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; line-height: 1.6; }

    /* ── DONE SECTION ───────────────────────────────── */
    .done-toggle {
      display: flex; align-items: center; gap: 8px;
      background: none; border: none;
      color: var(--faint); font-size: 0.82rem;
      cursor: pointer; font-family: inherit;
      margin-top: 28px; margin-bottom: 12px;
      padding: 0;
      transition: color 180ms;
    }

    .done-toggle:hover { color: var(--muted); }
    .done-toggle .arrow { transition: transform 200ms; display: inline-block; }
    .done-toggle.open .arrow { transform: rotate(90deg); }

    #done-list { display: none; gap: 8px; list-style: none; }
    #done-list.visible { display: grid; }

    /* ── STATUS BAR ─────────────────────────────────── */
    .status-bar {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 0.82rem;
      color: var(--muted);
      display: flex; align-items: center; gap: 8px;
      pointer-events: none;
      white-space: nowrap;
      z-index: 10;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #f4d08a;
      animation: pulse-dot 1.4s ease-in-out infinite;
    }

    .status-dot.online  { background: #4caf7d; animation: pulse-dot 2.5s ease-in-out infinite; }
    .status-dot.offline { background: #f44; animation: none; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* ── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 480px) {
      .app { padding: 28px 16px 72px; }
      header { flex-direction: column; align-items: flex-start; gap: 10px; }
      .add-form { flex-direction: column; }
      .add-btn { width: 100%; height: 48px; }
      .item-name-tag { display: none; }
      .delete-btn { width: 40px; height: 40px; }
      .check-btn  { width: 30px; height: 30px; }
    }
  </style>
</head>
<body>

  <div class="app">
    <header>
      <div class="header-left">
        <h1>Lista della Spesa</h1>
        <div class="subtitle">Famiglia · aggiornamento in tempo reale</div>
      </div>
      <div class="item-count" id="item-count">—</div>
    </header>

    <!-- Selezione utente -->
    <div class="user-bar">
      <button class="user-chip" data-user="ila"   onclick="selectUser('ila')">
        <span class="avatar" data-user="ila">ILA</span> Ila
      </button>
      <button class="user-chip" data-user="andre" onclick="selectUser('andre')">
        <span class="avatar" data-user="andre">AND</span> Andre
      </button>
      <button class="user-chip" data-user="matte" onclick="selectUser('matte')">
        <span class="avatar" data-user="matte">MAT</span> Matte
      </button>
      <button class="user-chip" data-user="nick"  onclick="selectUser('nick')">
        <span class="avatar" data-user="nick">NCK</span> Nick
      </button>
    </div>

    <!-- Form aggiunta -->
    <form class="add-form" onsubmit="addItem(event)">
      <input
        id="item-input"
        class="add-input"
        type="text"
        placeholder="Seleziona prima il tuo nome…"
        autocomplete="off"
        maxlength="120"
        disabled
      />
      <button type="submit" class="add-btn" id="add-btn" disabled>+</button>
    </form>

    <!-- Lista da comprare -->
    <div class="section-label">Da comprare</div>
    <ul id="item-list">
      <li class="empty-state">
        <div class="icon">🛒</div>
        <p>Nessun articolo ancora.<br>Seleziona il tuo nome e inizia!</p>
      </li>
    </ul>

    <!-- Lista comprata -->
    <button class="done-toggle" id="done-toggle" onclick="toggleDone()">
      <span class="arrow">▶</span>
      <span id="done-label">Nel carrello (0)</span>
    </button>
    <ul id="done-list"></ul>
  </div>

  <!-- Barra stato -->
  <div class="status-bar">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Connessione…</span>
  </div>

  <!-- Gun.js — zero config, P2P real-time -->
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>

  <script>
    /* ─────────────────────────────────────────────────
       Chiave unica per questa famiglia — cambiala se
       vuoi una lista privata (stringa qualsiasi).
    ───────────────────────────────────────────────── */
    const FAMILY_KEY = "spesa-famiglia-ila-andre-matte-nick-2025";
    const USER_KEY   = "lista_spesa_user";

    const DISPLAY = { ila: "Ila", andre: "Andre", matte: "Matte", nick: "Nick" };
    const INITIALS = { ila: "ILA", andre: "AND", matte: "MAT", nick: "NCK" };

    /* ─────────────────────────────────────────────────
       STATO
    ───────────────────────────────────────────────── */
    let currentUser = localStorage.getItem(USER_KEY) || null;
    let doneOpen    = false;
    const items     = {};   /* id → { text, user, done, ts } */

    /* ─────────────────────────────────────────────────
       GUN INIT
    ───────────────────────────────────────────────── */
    const gun = Gun({
      peers: [
        "https://gun-manhattan.herokuapp.com/gun",
        "https://peer.wallie.io/gun"
      ]
    });

    const listRef = gun.get(FAMILY_KEY);

    /* Ascolta ogni nodo figlio */
    listRef.map().on((data, id) => {
      if (!data || data.deleted === true) {
        delete items[id];
      } else {
        items[id] = {
          text: data.text || "",
          user: data.user || "ila",
          done: data.done === true,
          ts:   data.ts   || 0
        };
      }
      renderAll();
    });

    /* Stato connessione Gun (usa il ping al peer) */
    let connTimer = setTimeout(() => setStatus("offline", "Offline — le modifiche si sincronizzeranno al ritorno"), 6000);
    gun.on("hi",  () => { clearTimeout(connTimer); setStatus("online",  "Connesso · aggiornamento live"); });
    gun.on("bye", () => setStatus("offline", "Offline — le modifiche si sincronizzeranno al ritorno"));

    /* ─────────────────────────────────────────────────
       UTENTE
    ───────────────────────────────────────────────── */
    function selectUser(user) {
      currentUser = user;
      localStorage.setItem(USER_KEY, user);
      document.querySelectorAll(".user-chip").forEach(c => c.classList.remove("active"));
      document.querySelector(`.user-chip[data-user="${user}"]`).classList.add("active");
      document.getElementById("add-btn").disabled   = false;
      document.getElementById("item-input").disabled = false;
      document.getElementById("item-input").placeholder = "Cosa compriamo, " + DISPLAY[user] + "?";
      document.getElementById("item-input").focus();
    }

    /* ─────────────────────────────────────────────────
       ADD / TOGGLE / DELETE
    ───────────────────────────────────────────────── */
    function addItem(e) {
      e.preventDefault();
      if (!currentUser) return;
      const input = document.getElementById("item-input");
      const text  = input.value.trim();
      if (!text) return;

      const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
      listRef.get(id).put({ text, user: currentUser, done: false, ts: Date.now(), deleted: false });
      input.value = "";
    }

    function toggleCheck(id) {
      const item = items[id];
      if (!item) return;
      listRef.get(id).get("done").put(!item.done);
    }

    function deleteItem(id) {
      listRef.get(id).put({ deleted: true });
    }

    /* ─────────────────────────────────────────────────
       RENDER
    ───────────────────────────────────────────────── */
    function renderAll() {
      const todo = [];
      const done = [];

      Object.entries(items)
        .sort((a, b) => (a[1].ts || 0) - (b[1].ts || 0))
        .forEach(([id, item]) => {
          (item.done ? done : todo).push({ id, ...item });
        });

      renderList("item-list", todo, true);
      renderList("done-list", done, false);

      document.getElementById("item-count").textContent =
        todo.length === 0 ? "Vuota" :
        todo.length === 1 ? "1 articolo" :
        todo.length + " articoli";

      document.getElementById("done-label").textContent =
        "Nel carrello (" + done.length + ")";
    }

    function renderList(listId, entries, showEmpty) {
      const ul = document.getElementById(listId);

      if (entries.length === 0) {
        ul.innerHTML = showEmpty
          ? `<li class="empty-state"><div class="icon">🛒</div><p>Nessun articolo ancora.<br>Seleziona il tuo nome e inizia!</p></li>`
          : "";
        return;
      }

      ul.innerHTML = entries.map(item => `
        <li class="item-card${item.done ? " checked" : ""}">
          <button class="check-btn" onclick="toggleCheck('${item.id}')">
            ${item.done ? "✓" : ""}
          </button>
          <span class="item-text">${esc(item.text)}</span>
          <div class="item-meta">
            <span class="item-avatar" data-user="${item.user}">${INITIALS[item.user] || "?"}</span>
            <span class="item-name-tag">${DISPLAY[item.user] || item.user}</span>
          </div>
          <button class="delete-btn" onclick="deleteItem('${item.id}')">✕</button>
        </li>
      `).join("");
    }

    /* ─────────────────────────────────────────────────
       DONE TOGGLE
    ───────────────────────────────────────────────── */
    function toggleDone() {
      doneOpen = !doneOpen;
      document.getElementById("done-toggle").classList.toggle("open", doneOpen);
      document.getElementById("done-list").classList.toggle("visible", doneOpen);
    }

    /* ─────────────────────────────────────────────────
       STATUS
    ───────────────────────────────────────────────── */
    function setStatus(state, text) {
      document.getElementById("status-dot").className = "status-dot " + state;
      document.getElementById("status-text").textContent = text;
    }

    /* ─────────────────────────────────────────────────
       BOOT
    ───────────────────────────────────────────────── */
    if (currentUser) selectUser(currentUser);

    function esc(str) {
      return String(str)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
  </script>
</body>
</html>
